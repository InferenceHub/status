owner: InferenceHub
repo: status

# What we actually promise customers: the gateway keeps serving, the portal and chat are
# reachable, and the marketing site is up. /healthz is the gateway's own health contract,
# so a green check = a live, serving build. /v1/models is auth-gated — a 401 still proves
# the API edge + app are up (a down gateway can't emit its own auth error).
sites:
  - name: API gateway
    url: https://app.inferencehub.tech/healthz
    expectedStatusCodes:
      - 200
  - name: API surface (/v1)
    url: https://app.inferencehub.tech/v1/models
    expectedStatusCodes:
      - 200
      - 401
  - name: Portal
    url: https://app.inferencehub.tech/portal
    expectedStatusCodes:
      - 200
  - name: Chat
    url: https://chat.inferencehub.tech
    expectedStatusCodes:
      - 200
  - name: Website
    url: https://inferencehub.tech
    expectedStatusCodes:
      - 200

status-website:
  # No custom domain yet — served from GitHub Pages at inferencehub.github.io/status.
  # To move to status.inferencehub.tech later: add a CNAME DNS record pointing at
  # inferencehub.github.io and replace baseUrl with `cname: status.inferencehub.tech`.
  baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/InferenceHub/inferencehub-site/main/public/icon.svg
  name: InferenceHub Status
  introTitle: "**InferenceHub** status — live uptime and response times for every surface."
  introMessage: Every check runs from public GitHub Actions and commits its result to [this repository](https://github.com/InferenceHub/status), so the history is independently auditable — nothing here is self-reported.
  navbar:
    - title: Status
      href: /
    - title: InferenceHub
      href: https://inferencehub.tech
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Defaults elsewhere: checks every 5 min, response-time graphs daily, issues opened on outage.
